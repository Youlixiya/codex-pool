# Dev overlay: mount source code, no image rebuild after code changes.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Requires base images pulled once: ./scripts/pull-base-images.sh

services:
  admin-api:
    image: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    build: !reset null
    working_dir: /app
    volumes:
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./README.md:/app/README.md:ro
      - ./src:/app/src:ro
      - ./web/dist:/app/web/dist:ro
    command: >
      sh -c "pip install -q --no-cache-dir hatchling &&
             pip install -q --no-cache-dir . &&
             codex-pool-admin --host 0.0.0.0 --port 8790 --reload"

  web:
    image: ${NGINX_BASE_IMAGE:-nginx:alpine}
    build: !reset null
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
