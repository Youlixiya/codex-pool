# Production stack for 2G/2C VPS: host :80 -> app :8790 (UI + API + /v1 proxy).
# Usage: cp .env.prod.example .env.prod && edit secrets && ./scripts/deploy-prod.sh

name: codex-pool-prod

services:
  mysql:
    image: mysql:8.4
    container_name: codex-pool-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.prod}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-codex_pool}
      MYSQL_USER: ${MYSQL_USER:-codex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env.prod}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./deploy/mysql/production.cnf:/etc/mysql/conf.d/99-production.cnf:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: codex-pool-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60"
      - "1000"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22-alpine}
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: codex-pool:${CODEX_POOL_IMAGE_TAG:-prod}
    container_name: codex-pool-app
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-codex}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-codex_pool}
      REDIS_URL: redis://redis:6379/0
      WEB_DIST: /app/web/dist
      HOME: /data
      BILLING_STUB_ENABLED: ${BILLING_STUB_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.prod}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env.prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      CHATGPT_AUTH_DIR: ${CHATGPT_AUTH_DIR:-/data/.codex-pool/auth}
      CHATGPT_OAUTH_REDIRECT_URI: ${CHATGPT_OAUTH_REDIRECT_URI:-http://127.0.0.1:1455/auth/callback}
      CHATGPT_OAUTH_CALLBACK_PORT: ${CHATGPT_OAUTH_CALLBACK_PORT:-1455}
    ports:
      - "${APP_HTTP_PORT:-80}:8790"
      - "${CHATGPT_OAUTH_CALLBACK_PORT:-1455}:1455"
    volumes:
      - app_data:/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - internal

volumes:
  mysql_data:
  redis_data:
  app_data:

networks:
  internal:
    driver: bridge
