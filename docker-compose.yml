services:
  mysql:
    image: mysql:8.4
    container_name: codex-pool-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: codex_pool
      MYSQL_USER: codex
      MYSQL_PASSWORD: codex
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: codex-pool-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    container_name: codex-pool-admin
    environment:
      DATABASE_URL: mysql+pymysql://codex:codex@mysql:3306/codex_pool
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      BILLING_STUB_ENABLED: "false"
      WEB_DIST: /app/web/dist
    ports:
      - "8790:8790"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:alpine}
    container_name: codex-pool-web
    ports:
      - "5173:80"
    depends_on:
      - admin-api

volumes:
  mysql_data:
